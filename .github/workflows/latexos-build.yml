name: Build LaTexOS Docker Image

on:
    pull_request:
        branches:
            - main

jobs:
    build:
        #runs-on: opensuse/leap
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v2

            # - name: Login to GitHub Container Registry
            #   uses: docker/login-action@v3
            #   with:
            #     username: ${{ secrets.GITHUB_ACTOR }}
            #     password: ${{ secrets.GITHUB_TOKEN }}
            
            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v1

            - name: Build Docker image
              id: build_image
              run: |
                TAGNAME="latexos"
                TAGVERSION="temp"

                cd LaTexOS
                docker buildx build --platform linux/amd64 --tag ${TAGNAME}:${TAGVERSION} --load .
  
            - name: Save image digest
              run: echo "digest=$(docker inspect --format='{{index .RepoDigests 0}}' latexos:temp)" >> $GITHUB_ENV
