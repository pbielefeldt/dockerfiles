name: Docker Build and LaTeX Verify

on:
    pull_request:
        branches:
            - main

jobs:
    build-and-push:
        #runs-on: opensuse/leap
        runs-on: ubuntu-latest
        
        steps:
        - name: Checkout code
          uses: actions/checkout@v2

        - name: Login to Docker Hub
          uses: docker/login-action@v3
          with:
              username: ${{ secrets.DOCKERHUB_USERNAME }}
              password: ${{ secrets.DOCKERHUB_TOKEN }}
        
        - name: Set up Docker Buildx
          uses: docker/setup-buildx-action@v1

        - name: Build and push Docker image
          run: |
            TAGNAME="${{ secrets.DOCKERHUB_USERNAME }}/latexos"
            TAGVERSION="15.5.3"

            cd LaTexOS
            if [ "${{ github.event_name }}" == "pull_request" ]; then
                TAGVERSION="${TAGVERSION}-testing"
            fi
            docker buildx build --platform linux/amd64 --tag ${TAGNAME}:${TAGVERSION} --tag ${TAGNAME}:latest --push .

    build-and-verify-pdf:
        needs: build-and-push
        runs-on: ubuntu-latest

        container:
            image: ${{ secrets.DOCKERHUB_USERNAME }}/latexos:latest

        steps:
        - name: Checkout code
          uses: actions/checkout@v2

        - name: Build LaTeX Test document
          run: |
            cd LaTexOS/testfiles/
            make all

